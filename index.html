
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIO · Creator Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;1,400&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --void:#060608;--deep:#0d0d10;--surface:#141418;--lift:#1c1c22;
  --border:rgba(255,255,255,.07);--silver:#8a8a96;--white:#ede9e2;
  --ember:#d4742a;--ember2:#e8a055;--edim:rgba(212,116,42,.12);
  --teal:#2e8a9c;--film:#b8a882;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--void);color:var(--white);font-family:'Outfit',sans-serif;font-weight:300}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--deep)}::-webkit-scrollbar-thumb{background:var(--ember)}

/* ── LAYOUT ── */
.app{display:grid;grid-template-rows:52px 1fr;height:100vh}
.workspace{display:grid;grid-template-columns:220px 1fr 290px;height:calc(100vh - 52px);overflow:hidden}

/* ── HEADER ── */
.hdr{background:rgba(6,6,8,.98);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.2em;flex-shrink:0}
.logo em{color:var(--ember);font-style:normal}
.hdiv{width:1px;height:26px;background:var(--border);flex-shrink:0}
.mode-pills{display:flex;gap:2px}
.mpill{font-family:'Outfit',sans-serif;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;padding:5px 13px;background:none;border:1px solid transparent;color:var(--silver);cursor:pointer;transition:all .18s;white-space:nowrap}
.mpill:hover{color:var(--white);border-color:var(--border)}
.mpill.on{background:var(--ember);border-color:var(--ember);color:var(--void);font-weight:600}
.hdr-r{margin-left:auto;display:flex;gap:6px}
.hbtn{font-family:'Outfit',sans-serif;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;padding:6px 14px;background:none;border:1px solid var(--border);color:var(--silver);cursor:pointer;transition:all .18s;white-space:nowrap}
.hbtn:hover{border-color:var(--ember);color:var(--ember)}
.hbtn.em{background:var(--ember);border-color:var(--ember);color:var(--void);font-weight:600}
.hbtn.em:hover{background:var(--ember2)}
.hbtn:disabled{opacity:.35;cursor:not-allowed}

/* ── LEFT PANEL ── */
.pl{background:var(--deep);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.pl-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.pltab{flex:1;font-family:'Outfit',sans-serif;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;padding:9px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--silver);cursor:pointer;transition:all .18s}
.pltab:hover{color:var(--white)}
.pltab.on{color:var(--ember);border-bottom-color:var(--ember)}
.pl-body{flex:1;overflow-y:auto;padding:12px 10px}
.pl-sec{margin-bottom:16px}
.pl-lbl{font-size:.48rem;letter-spacing:.28em;text-transform:uppercase;color:var(--ember);margin-bottom:8px;display:block}

/* template list */
.tpl-list{display:flex;flex-direction:column;gap:5px}
.ti-row{display:flex;gap:8px;align-items:center;padding:7px;border:1px solid var(--border);cursor:pointer;transition:all .18s}
.ti-row:hover{border-color:rgba(212,116,42,.4);background:var(--surface)}
.ti-row.on{border-color:var(--ember);background:var(--edim)}
.ti-ico{width:38px;height:38px;flex-shrink:0;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:1rem}
.ti-info strong{font-size:.66rem;font-weight:500;color:var(--white);display:block}
.ti-info span{font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ember);margin-top:1px;display:block}

/* upload zone */
.upzone{border:1px dashed rgba(212,116,42,.32);padding:16px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.upzone:hover,.upzone.drag{border-color:var(--ember);background:var(--edim)}
.upzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upzone-ico{font-size:1.4rem;display:block;margin-bottom:6px}
.upzone-t{font-size:.63rem;color:var(--silver);line-height:1.55}
.upzone-s{font-size:.52rem;color:rgba(255,255,255,.22);margin-top:3px}

.media-list{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.mitem{display:flex;gap:7px;align-items:center;padding:6px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:border-color .18s}
.mitem:hover{border-color:rgba(212,116,42,.4)}
.mitem.on{border-color:var(--ember)}
.mthumb{width:34px;height:34px;object-fit:cover;flex-shrink:0;background:var(--lift)}
.minfo{flex:1;min-width:0}
.mname{font-size:.6rem;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mtype{font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ember);margin-top:1px}
.mdel{background:none;border:none;color:var(--silver);cursor:pointer;padding:3px 5px;font-size:.75rem;flex-shrink:0}
.mdel:hover{color:#c43a5a}

/* ── CENTER ── */
.pc{display:flex;flex-direction:column;align-items:center;background:#060608;overflow:auto;padding:20px 16px}
.canvas-toolbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;justify-content:center;width:100%;max-width:560px}
.sz-btn{font-family:'Outfit',sans-serif;font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;padding:5px 11px;background:none;border:1px solid var(--border);color:var(--silver);cursor:pointer;transition:all .18s}
.sz-btn:hover{border-color:var(--ember);color:var(--ember)}
.sz-btn.on{background:var(--ember);border-color:var(--ember);color:var(--void);font-weight:600}
.canvas-wrap{position:relative;flex-shrink:0}
#mc{display:block;box-shadow:0 16px 64px rgba(0,0,0,.8)}
.c-foot{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:560px}
.cfbtn{font-family:'Outfit',sans-serif;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;padding:8px 15px;border:1px solid var(--border);color:var(--silver);background:none;cursor:pointer;transition:all .18s;white-space:nowrap}
.cfbtn:hover{border-color:var(--ember);color:var(--ember)}
.cfbtn.em{background:var(--ember);border-color:var(--ember);color:var(--void);font-weight:600}
.cfbtn.em:hover{background:var(--ember2)}
/* export formats */
.fmt-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px;max-width:560px;width:100%}
.fmt-btn{background:var(--surface);border:1px solid var(--border);padding:8px 4px;text-align:center;cursor:pointer;transition:all .18s}
.fmt-btn:hover{border-color:rgba(212,116,42,.4)}
.fmt-btn.on{border-color:var(--ember);background:var(--edim)}
.fmt-ico{font-size:.9rem;display:block;margin-bottom:3px}
.fmt-nm{font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--white)}
.fmt-sz{font-size:.46rem;color:var(--silver);margin-top:1px}

/* ── RIGHT PANEL ── */
.pr{background:var(--deep);border-left:1px solid var(--border);overflow-y:auto;padding:12px}
.pr-sec{margin-bottom:16px}
.pr-lbl{font-size:.48rem;letter-spacing:.28em;text-transform:uppercase;color:var(--ember);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);display:block}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:7px}
.field label{font-size:.56rem;letter-spacing:.08em;color:var(--silver)}
.field input,.field textarea,.field select{background:var(--surface);border:1px solid var(--border);color:var(--white);font-family:'Outfit',sans-serif;font-size:.72rem;padding:5px 7px;outline:none;transition:border-color .18s;width:100%}
.field input:focus,.field textarea:focus{border-color:rgba(212,116,42,.5)}
.field textarea{resize:vertical;min-height:46px}
.field select option{background:var(--surface)}
.srow{display:flex;flex-direction:column;gap:3px;margin-bottom:7px}
.srow label{font-size:.56rem;letter-spacing:.08em;color:var(--silver);display:flex;justify-content:space-between}
.srow label b{color:var(--ember);font-weight:400}
.srow input[type=range]{width:100%;accent-color:var(--ember);cursor:pointer}
.ccols{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:7px}
.ccolitem{display:flex;flex-direction:column;align-items:center;gap:2px}
.ccolitem input[type=color]{width:100%;height:26px;border:1px solid var(--border);padding:2px;background:var(--surface);cursor:pointer}
.ccolitem span{font-size:.42rem;letter-spacing:.06em;color:var(--silver);text-align:center}
.prow{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:7px}
.prbtn{font-family:'Outfit',sans-serif;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 3px;cursor:pointer;border:none;transition:opacity .18s;text-align:center}
.prbtn:hover{opacity:.8}
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:3px}
.tog-row label{font-size:.63rem;color:var(--white)}
.tog{position:relative;width:30px;height:16px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;inset:0;background:var(--surface);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:.22s}
.tog-sl::before{content:'';position:absolute;height:10px;width:10px;left:2px;bottom:2px;background:var(--silver);border-radius:50%;transition:.22s}
.tog input:checked+.tog-sl{background:var(--ember);border-color:var(--ember)}
.tog input:checked+.tog-sl::before{transform:translateX(14px);background:#fff}
/* placement buttons */
.pos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:7px}
.posbtn{font-size:.5rem;padding:5px;background:var(--surface);border:1px solid var(--border);color:var(--silver);cursor:pointer;text-align:center;transition:all .18s}
.posbtn:hover{border-color:var(--ember);color:var(--ember)}
.posbtn.on{background:var(--ember);border-color:var(--ember);color:var(--void)}
/* layers */
.lyr-list{display:flex;flex-direction:column;gap:4px}
.lyr{display:flex;align-items:center;gap:6px;padding:6px 7px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .18s}
.lyr:hover{border-color:rgba(212,116,42,.35)}
.lyr.on{border-color:var(--ember);background:var(--edim)}
.lyr-ico{font-size:.85rem;flex-shrink:0}
.lyr-nm{font-size:.63rem;color:var(--white);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lyr-btn{background:none;border:none;color:var(--silver);cursor:pointer;font-size:.65rem;padding:2px 4px}
.lyr-btn:hover{color:var(--ember)}
.lyr-del:hover{color:#c43a5a!important}
.add-lbtn{width:100%;background:none;border:1px dashed var(--border);color:var(--silver);font-family:'Outfit',sans-serif;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;padding:7px;cursor:pointer;margin-top:5px;transition:all .18s}
.add-lbtn:hover{border-color:var(--ember);color:var(--ember)}
/* placement preview area in panel */
.placement-preview{width:100%;aspect-ratio:1;background:var(--surface);border:1px solid var(--border);position:relative;overflow:hidden;margin-bottom:7px;cursor:crosshair}
.placement-preview canvas{width:100%!important;height:100%!important}
.pp-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:rgba(255,255,255,.2);pointer-events:none;text-align:center;line-height:1.6}

/* ── SHARE MODAL ── */
.smodal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.smodal.open{display:flex}
.sbox{background:var(--deep);border:1px solid var(--border);padding:28px;width:min(94vw,420px);animation:popIn .28s ease}
@keyframes popIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.sbox-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.1em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sbox-title em{color:var(--ember);font-style:normal}
.s-prev{background:var(--surface);border:1px solid var(--border);padding:10px;display:flex;gap:10px;align-items:center;margin-bottom:14px}
.s-prev-img{width:56px;height:56px;object-fit:cover;flex-shrink:0}
.s-prev-info strong{font-size:.72rem;color:var(--white);display:block;margin-bottom:2px}
.s-prev-info span{font-size:.56rem;color:var(--silver)}
.s-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sopt{background:var(--surface);border:1px solid var(--border);padding:14px;text-align:center;cursor:pointer;transition:all .18s}
.sopt:hover{border-color:rgba(212,116,42,.4);background:var(--lift)}
.sopt-ico{font-size:1.4rem;display:block;margin-bottom:6px}
.sopt-nm{font-size:.64rem;font-weight:500;color:var(--white)}
.sopt-d{font-size:.52rem;color:var(--silver);margin-top:2px;line-height:1.4}
.s-close{width:100%;background:none;border:1px solid var(--border);color:var(--silver);font-family:'Outfit',sans-serif;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;padding:9px;cursor:pointer;transition:all .18s}
.s-close:hover{border-color:var(--ember);color:var(--ember)}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:var(--ember);color:var(--void);font-family:'Outfit',sans-serif;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;font-weight:600;padding:9px 18px;transform:translateY(56px);opacity:0;transition:all .28s cubic-bezier(.16,1,.3,1);pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<header class="hdr">
  <div class="logo">RIO<em>.</em>STUDIO</div>
  <div class="hdiv"></div>
  <div class="mode-pills">
    <button class="mpill on"  onclick="setMode('template',this)">📐 テンプレート</button>
    <button class="mpill"     onclick="setMode('photo',this)">🖼️ フォト投稿</button>
    <button class="mpill"     onclick="setMode('video',this)">🎬 動画オーバーレイ</button>
  </div>
  <div class="hdr-r">
    <button class="hbtn" onclick="openShare()">🔗 シェア</button>
    <button class="hbtn em" id="dlBtn" onclick="doExport('png')">📥 PNG 保存</button>
  </div>
</header>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- LEFT -->
  <div class="pl">
    <div class="pl-tabs">
      <button class="pltab on"  onclick="switchPLTab('tpl',this)">Templates</button>
      <button class="pltab"     onclick="switchPLTab('media',this)">Media</button>
    </div>
    <div class="pl-body" id="plBody"></div>
  </div>

  <!-- CENTER -->
  <div class="pc">
    <div class="canvas-toolbar">
      <button class="sz-btn on" onclick="setFmt('ig-sq',this)">■ 正方形</button>
      <button class="sz-btn"    onclick="setFmt('ig-st',this)">▭ ストーリー</button>
      <button class="sz-btn"    onclick="setFmt('ig-ld',this)">▬ 横長</button>
      <button class="sz-btn"    onclick="setFmt('x-post',this)">◻ X/OGP</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="mc"></canvas>
    </div>
    <div class="c-foot">
      <button class="cfbtn" onclick="undo()">↩ Undo</button>
      <button class="cfbtn" onclick="addTextLayer()">＋ テキスト</button>
      <button class="cfbtn" onclick="addLogoLayer()">＋ ロゴ</button>
      <button class="cfbtn em" onclick="doExport('png')">📥 PNG</button>
      <button class="cfbtn em" onclick="doExport('jpg')">📥 JPEG</button>
      <button class="cfbtn" onclick="openShare()">🔗 シェア</button>
    </div>
    <div class="fmt-row">
      <div class="fmt-btn on" onclick="clickFmt('ig-sq',this)"><span class="fmt-ico">📸</span><div class="fmt-nm">Instagram</div><div class="fmt-sz">1080×1080</div></div>
      <div class="fmt-btn"    onclick="clickFmt('ig-st',this)"><span class="fmt-ico">📱</span><div class="fmt-nm">Story/Reel</div><div class="fmt-sz">1080×1920</div></div>
      <div class="fmt-btn"    onclick="clickFmt('ig-ld',this)"><span class="fmt-ico">🖼️</span><div class="fmt-nm">横長</div><div class="fmt-sz">1080×566</div></div>
      <div class="fmt-btn"    onclick="clickFmt('x-post',this)"><span class="fmt-ico">𝕏</span><div class="fmt-nm">X / OGP</div><div class="fmt-sz">1200×628</div></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="pr" id="panelR"></div>

</div><!-- /workspace -->
</div><!-- /app -->

<!-- SHARE MODAL -->
<div class="smodal" id="shareModal" onclick="if(event.target===this)closeSM()">
  <div class="sbox">
    <div class="sbox-title">シェア <em>/</em> エクスポート</div>
    <div class="s-prev"><img id="smImg" class="s-prev-img" src="" alt=""><div class="s-prev-info"><strong id="smTitle">-</strong><span id="smDesc">-</span></div></div>
    <div class="s-opts">
      <div class="sopt" onclick="shareAct('clipboard')"><span class="sopt-ico">📋</span><div class="sopt-nm">クリップボード</div><div class="sopt-d">コピーしてSNSに貼り付け</div></div>
      <div class="sopt" onclick="shareAct('png')"><span class="sopt-ico">🖼️</span><div class="sopt-nm">PNG 保存</div><div class="sopt-d">高解像度ダウンロード</div></div>
      <div class="sopt" onclick="shareAct('jpg')"><span class="sopt-ico">📁</span><div class="sopt-nm">JPEG 保存</div><div class="sopt-d">軽量・SNS向け</div></div>
      <div class="sopt" onclick="shareAct('native')"><span class="sopt-ico">🔗</span><div class="sopt-nm">共有メニュー</div><div class="sopt-d">システムシート（モバイル対応）</div></div>
    </div>
    <button class="s-close" onclick="closeSM()">✕ 閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
const S = {
  mode: 'template',
  fmt: 'ig-sq',
  cW: 1080, cH: 1080,
  dW: 520,  dH: 520,
  tplId: 'p1',
  plTab: 'tpl',
  media: [],          // {id,name,type,url,img,file}
  bgId: null,         // media id used as background
  bgPos: 'cover',     // cover|contain|fill
  bgOpacity: 0.9,
  bgBlur: 0,
  frameId: null,      // media id placed in template frame
  framePos: 'cover',
  overlay: { on:true, color:'#000000', opacity:0.42 },
  colors: { ac:'#d4742a', bg:'#141418', txt:'#ede9e2' },
  textVals: {},       // tplId → {k:v}
  layers: [],         // free layers (text/logo)
  selLayer: null,
  undoStack: [],
  shareDataUrl: '',
  videoEl: null,      // for live video preview
  videoAF: null,
};

const FMTS = {
  'ig-sq':  {w:1080,h:1080},
  'ig-st':  {w:1080,h:1920},
  'ig-ld':  {w:1080,h:566},
  'x-post': {w:1200,h:628},
};

/* ══════════════════════════════════════════════
   CANVAS
══════════════════════════════════════════════ */
const cv = document.getElementById('mc');
const ctx = cv.getContext('2d');
let rafId = null;

function calcDisplay(w, h) {
  const maxW = Math.min(540, window.innerWidth * 0.45);
  const maxH = window.innerHeight * 0.65;
  const s = Math.min(maxW / w, maxH / h);
  return { dW: Math.round(w * s), dH: Math.round(h * s) };
}

function applyFmt(fmtKey) {
  const f = FMTS[fmtKey];
  S.cW = f.w; S.cH = f.h;
  const { dW, dH } = calcDisplay(f.w, f.h);
  S.dW = dW; S.dH = dH;
  cv.width = f.w; cv.height = f.h;
  cv.style.width = dW + 'px';
  cv.style.height = dH + 'px';
}

function setFmt(key, btn) {
  S.fmt = key;
  document.querySelectorAll('.sz-btn').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  applyFmt(key);
  schedRender();
}
function clickFmt(key, btn) {
  setFmt(key, null);
  document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  // sync size buttons
  const map = {'ig-sq':0,'ig-st':1,'ig-ld':2,'x-post':3};
  document.querySelectorAll('.sz-btn').forEach((b,i)=>b.classList.toggle('on',i===map[key]));
}

function schedRender() {
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(renderAll);
}

async function renderAll() {
  const W = S.cW, H = S.cH;
  ctx.clearRect(0,0,W,H);

  // 1. Background (solid or media)
  if (S.bgId) {
    const m = S.media.find(x => x.id === S.bgId);
    if (m) {
      const src = (S.mode === 'video' && m.type === 'video' && S.videoEl) ? S.videoEl : m.img;
      if (src) {
        if (S.bgBlur > 0) { ctx.save(); ctx.filter = `blur(${S.bgBlur}px)`; }
        ctx.globalAlpha = S.bgOpacity;
        drawFit(src, 0, 0, W, H, S.bgPos);
        ctx.globalAlpha = 1;
        if (S.bgBlur > 0) ctx.restore();
      }
    }
  } else {
    ctx.fillStyle = S.colors.bg;
    ctx.fillRect(0, 0, W, H);
  }

  // 2. Overlay
  if (S.overlay.on) {
    ctx.globalAlpha = S.overlay.opacity;
    ctx.fillStyle = S.overlay.color;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // 3. Template (draws text/graphic elements + frame if needed)
  if (S.mode === 'template') await drawTpl(W, H);
  else if (S.mode === 'photo') drawPhotoMode(W, H);
  else if (S.mode === 'video') await drawVideoMode(W, H);

  // 4. Free layers
  for (const l of S.layers) {
    if (!l.visible) continue;
    if (l.type === 'text' || l.type === 'logo') renderTextLayer(l, W, H);
  }

  // 5. Grain
  grain(W, H);
}

function drawFit(img, x, y, w, h, mode) {
  const iw = img.videoWidth || img.naturalWidth || img.width || 1;
  const ih = img.videoHeight || img.naturalHeight || img.height || 1;
  if (mode === 'cover') {
    const s = Math.max(w / iw, h / ih);
    ctx.drawImage(img, x + (w - iw*s)/2, y + (h - ih*s)/2, iw*s, ih*s);
  } else if (mode === 'contain') {
    const s = Math.min(w / iw, h / ih);
    ctx.drawImage(img, x + (w - iw*s)/2, y + (h - ih*s)/2, iw*s, ih*s);
  } else {
    ctx.drawImage(img, x, y, w, h);
  }
}

function grain(W, H) {
  ctx.save();
  const id = ctx.createImageData(W, H);
  const d = id.data;
  for (let i = 0; i < d.length; i+=4) {
    const n = (Math.random()-.5)*14;
    d[i]=d[i+1]=d[i+2]=128+n; d[i+3]=6;
  }
  ctx.putImageData(id, 0, 0);
  ctx.restore();
}

      [[.08,ac],[.11,'rgba(255,255,255,.18)'],[.14,'rgba(255,255,255,.18)'],[.17,'rgba(255,255,255,.18)'],[.20,'rgba(255,255,255,.18)']].forEach(([x,c])=>{ctx.fillStyle=c;ctx.beginPath();ctx.arc(W*x,H*.94,3.5,0,Math.PI*2);ctx.fill()});
      ctx.font=`300 ${W*.021}px "Outfit"`;ctx.fillStyle='#8a8a96';ctx.letterSpacing='0.14em';ctx.textAlign='right';ctx.fillText('スワイプ →',W*.93,H*.944);ctx.textAlign='left';
    }
  },
];

// text wrap util
function wrapText(ctx, text, maxW) {
  const words = (text||'').split(' ');
  const lines=[]; let cur='';
  for(const w of words){const t=cur?cur+' '+w:w;if(ctx.measureText(t).width>maxW&&cur){lines.push(cur);cur=w;}else cur=t}
  if(cur)lines.push(cur);
  return lines;
}

function buildMediaListHTML(){

  return S.media.map(m=>`
    <div class="mitem${m.id===S.bgId?' on':''}" onclick="setBgMedia('${m.id}')">
      <img class="mthumb" src="${m.thumb||m.url}" alt="">
      <div class="minfo"><div class="mname">${m.name}</div><div class="mtype">${m.type==='video'?'🎬 Video':'📷 Image'}</div></div>
      <button class="mdel" onclick="delMedia('${m.id}',event)">✕</button>
    </div>`).join('');
}

function setupDrop(){
  const z=document.getElementById('upzone');
  if(!z)return;
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag')});
  z.addEventListener('dragleave',()=>z.classList.remove('drag'));
  z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('drag');handleFiles(e.dataTransfer.files)});
}

async function handleFiles(files){
  for(const file of files){
    const id='m'+Date.now()+Math.random().toString(36).slice(2,6);
    const url=URL.createObjectURL(file);
    const isVid=file.type.startsWith('video/');
    let img=null, thumb=null;
    if(!isVid){
      img=await loadImage(url);
      thumb=url;
    } else {
      img=await videoFirstFrame(url);
      thumb=img?img.src:url;
    }
    S.media.push({id,name:file.name,type:isVid?'video':'image',url,thumb,img,file});
  }
  // auto-set as bg if first upload
  if(S.media.length>0 && !S.bgId) setBgMedia(S.media[S.media.length-1].id, false);
  buildPLBody();
  buildPanelR();
  schedRender();
}

function loadImage(url){
  return new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.onerror=()=>r(null);i.src=url});
}

function videoFirstFrame(url){
  return new Promise(r=>{
    const v=document.createElement('video');
    v.src=url;v.muted=true;v.playsInline=true;
    v.onloadeddata=()=>{v.currentTime=0.1};
    v.onseeked=()=>{
      const c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;
      c.getContext('2d').drawImage(v,0,0);
      const i=new Image();i.src=c.toDataURL();i.onload=()=>r(i);
    };
    v.onerror=()=>r(null);v.load();
  });
}

function setBgMedia(id, toast=true){
  S.bgId=id; S.frameId=id;
  buildPLBody();buildPanelR();schedRender();
  if(toast) showToast('背景 & フレームに設定しました');

function delMedia(id,e){
  e.stopPropagation();
  S.media=S.media.filter(m=>m.id!==id);
  if(S.bgId===id)S.bgId=null;
  if(S.frameId===id)S.frameId=null;
  buildPLBody();buildPanelR();schedRender();
}

    <div class="prow">${PRESETS.map(p=>`<button class="prbtn" style="background:${p.bg};color:${p.ac};border:1px solid ${p.ac}55" onclick="applyPreset('${p.bg}','${p.ac}')">${p.name}</button>`).join('')}</div>
  </div>`;

  // ── MEDIA / BG ──

    h+=`<div class="pr-sec"><span class="pr-lbl">背景メディア</span>
      <div class="field"><label>使用するメディア</label>
        <select onchange="S.bgId=this.value;schedRender()">

      <span class="pl-lbl" style="margin-top:4px">配置</span>
      <div class="pos-grid">
        ${[['cover','カバー'],['contain','収める'],['fill','引き伸ばし']].map(([k,l])=>`<button class="posbtn${S.bgPos===k?' on':''}" onclick="S.bgPos='${k}';document.querySelectorAll('.posbtn').forEach(b=>b.classList.remove('on'));this.classList.add('on');schedRender()">${l}</button>`).join('')}
      </div></div>`;

    // ── FRAME MEDIA (only for templates that have frames) ──

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function setTV(k,v){
  if(!S.textVals[S.tplId]) S.textVals[S.tplId]={};

let lyrCtr=0;

function addTextLayer(){

function addLogoLayer(){

function selLayer(id){S.selLayer=id;buildPanelR()}
function toggleLyrVis(id,e){e.stopPropagation();const l=S.layers.find(x=>x.id===id);if(l){l.visible=!l.visible;buildPanelR();schedRender()}}
function delLayer(id,e){e.stopPropagation();S.layers=S.layers.filter(x=>x.id!==id);if(S.selLayer===id)S.selLayer=null;buildPanelR();schedRender()}
function updateLyr(id,k,v){const l=S.layers.find(x=>x.id===id);if(l){l[k]=v;schedRender()}}

function renderTextLayer(l, W, H){
  ctx.save();
  ctx.font=`${l.style||'400'} ${(l.fontSize||60)*(W/1080)}px "${l.font||'Outfit'}"`;
  ctx.fillStyle=l.color||'#ede9e2';
  ctx.globalAlpha=l.opacity??1;
  ctx.textAlign=l.align||'left';
  ctx.letterSpacing=(l.ls||0)+'px';
  const lines=wrapText(ctx,l.text||'',(l.maxW||0.84)*W);
  const fs=(l.fontSize||60)*(W/1080);
  lines.forEach((t,i)=>ctx.fillText(t,l.x*W,l.y*H+i*fs*1.4));
  ctx.restore();
}

/* ══════════════════════════════════════════════
   CANVAS DRAG (text layers)
══════════════════════════════════════════════ */
let drag=null,dox=0,doy=0;
cv.addEventListener('mousedown',e=>{
  const r=cv.getBoundingClientRect();
  const sx=(e.clientX-r.left)/r.width,sy=(e.clientY-r.top)/r.height;
  for(let i=S.layers.length-1;i>=0;i--){
    const l=S.layers[i];if(!l.visible)continue;
    if(Math.abs(sx-l.x)<.15&&Math.abs(sy-l.y)<.08){drag=l;dox=sx-l.x;doy=sy-l.y;S.selLayer=l.id;buildPanelR();break}
  }
});
cv.addEventListener('mousemove',e=>{
  if(!drag)return;
  const r=cv.getBoundingClientRect();
  drag.x=Math.max(0,Math.min(.98,(e.clientX-r.left)/r.width-dox));
  drag.y=Math.max(.02,Math.min(.98,(e.clientY-r.top)/r.height-doy));
  schedRender();
});
cv.addEventListener('mouseup',()=>{drag=null});
cv.addEventListener('touchstart',e=>{
  const t=e.touches[0],r=cv.getBoundingClientRect();
  const sx=(t.clientX-r.left)/r.width,sy=(t.clientY-r.top)/r.height;
  for(let i=S.layers.length-1;i>=0;i--){
    const l=S.layers[i];if(!l.visible)continue;
    if(Math.abs(sx-l.x)<.18&&Math.abs(sy-l.y)<.1){drag=l;dox=sx-l.x;doy=sy-l.y;S.selLayer=l.id;break}
  }
},{passive:true});
cv.addEventListener('touchmove',e=>{
  if(!drag)return;e.preventDefault();
  const t=e.touches[0],r=cv.getBoundingClientRect();
  drag.x=Math.max(0,Math.min(.98,(t.clientX-r.left)/r.width-dox));
  drag.y=Math.max(.02,Math.min(.98,(t.clientY-r.top)/r.height-doy));
  schedRender();
},{passive:false});
cv.addEventListener('touchend',()=>{drag=null});

function closeSM(){document.getElementById('shareModal').classList.remove('open')}

async function shareAct(type){
  if(type==='clipboard'){
    try{
      const r=await fetch(shareUrl);const b=await r.blob();
      await navigator.clipboard.write([new ClipboardItem({'image/png':b})]);
      showToast('クリップボードにコピーしました！');
    }catch{
      await navigator.clipboard.writeText(shareUrl).catch(()=>{});
      showToast('画像URLをコピーしました');
    }
    closeSM();
  } else if(type==='png'){
    const a=document.createElement('a');a.href=shareUrl;a.download=`rio_${Date.now()}.png`;a.click();
    showToast('PNG 保存完了！');closeSM();
  } else if(type==='jpg'){
    await renderAll();
    const u=cv.toDataURL('image/jpeg',0.93);
    const a=document.createElement('a');a.href=u;a.download=`rio_${Date.now()}.jpg`;a.click();
    showToast('JPEG 保存完了！');closeSM();
  } else if(type==='native'){
    try{
      const r=await fetch(shareUrl);const b=await r.blob();
      const file=new File([b],'rio_post.png',{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'Rio Studio'});
      } else {
        showToast('このブラウザでは共有メニューを利用できません');
      }
    }catch(e){if(e.name!=='AbortError')showToast('共有に失敗しました')}
  }
}

/* ══════════════════════════════════════════════

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);
}
